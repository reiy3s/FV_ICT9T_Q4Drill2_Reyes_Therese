<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 2</title>
</head>

<style>

    #form-div{
        background-color: rgb(180, 138, 24);
        width: 400px;
    }

    .form-control{
        width: 350px;
        margin-left: 4%;
    }

</style>
<body>

    <br><br><br><br><br><br><br><br><br><br><br><br>
    <div class="container text-center" id="form-div">
    <form>

        <div>
            <label for="temperature">Temperature (C)</label>
            <input type="number" class="form-control" id="temperature" placeholder="Enter the temperature in celsius">
        </div>

        <br>

        <div>
            <label for="humidity">Humidity (%)</label>
            <input type="number" class="form-control" id="humidity" placeholder="Enter the humidity in percentage">
        </div>

        <br>

        <button type="submit" class="btn btn-info">Check</button>

    </form>
    </div>

    <script>

        function heatIndex(){

            var heatIndex = temperature + (0.33 * humidity) - 4;
            var temperature = document.getElementById("temperature").value;
            var humidity = document.getElementById("humidity").value;

            //popup = "";
            
            switch(true){
                case (heatIndex <= 27) :
                    //popup = "Heat Index Status: Comfortable and Cool"
                    alert("Heat Index Status: Comfortable and Cool")
                    break;

                case ((heatIndex >= 28) && (heatIndex)<=32) :
                    //popup = "Heat Index Status: Warm"
                    alert("Heat Index Status: Warm")
                    break;

                case ((heatIndex >= 33) && (heatIndex)<=37) :
                    //popup = "Heat Index Status: Hot"
                    alert("Heat Index Status: Hot")
                    break;

                case ((heatIndex >= 38) && (heatIndex)<=41) :
                    //popup = "Heat Index Status: Very Hot, Caution"
                    alert("Heat Index Status: Very Hot, Caution")
                    break;

                case (heatIndex >= 42) :
                    //popup = "Heat Index Status: Extreme Heat, Danger"
                    alert("Heat Index Status: Extreme Heat, Danger")
                    break;

                default:
                    //popup = "Heat Index Status: Unidentified. Please try again."
                    alert("Heat Index Status: Unidentified. Please try again.")
                    break;
            }

                //alert(popup);

        }

    </script>
    
</body>
</html>
